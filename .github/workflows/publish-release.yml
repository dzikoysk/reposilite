# GitHub Actions workflow to publish new releases.
name: "Publish releases"
on: workflow_dispatch

permissions:
  contents: read

env:
  JAVA_VERSION: 21

jobs:
  github:
    name: "GitHub"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: "${{ steps.version.outputs.version }}"
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Fetch git tags" # Required for axion-release-plugin
        run: git fetch --tags --unshallow

      - name: "Set up Java ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v5
        with:
          java-version: "${{ env.JAVA_VERSION }}"
          distribution: "liberica"

      - name: "Grant execute permission for gradlew"
        run: chmod +x gradlew

      - name: "Release new version"
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          ./gradlew release

      - name: "Get current version"
        id: version
        run: echo "version=$(./gradlew -q -Prelease.quiet cV)" >> "$GITHUB_OUTPUT"

  maven:
    name: "Maven"
    runs-on: ubuntu-latest
    needs: [ github ]
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          ref: "refs/tags/${{ needs.github.outputs.version }}"

      - name: "Fetch git tags" # Required for axion-release-plugin
        run: git fetch --tags --unshallow

      - name: "Set up Java ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v5
        with:
          java-version: "${{ env.JAVA_VERSION }}"
          distribution: "liberica"

      - name: "Grant execute permission for gradlew"
        run: chmod +x gradlew

      - name: "Set up Gradle"
        uses: gradle/actions/setup-gradle@v6

      - name: "Gradle publish"
        run: ./gradlew shadowJar publish
        env:
          MAVEN_NAME: ${{ secrets.MAVEN_NAME }}
          MAVEN_TOKEN: ${{ secrets.MAVEN_TOKEN }}

  docker:
    name: "Docker"
    runs-on: ubuntu-latest
    needs: [ github ]
    permissions:
      contents: read
      packages: write
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          ref: "refs/tags/${{ needs.github.outputs.version }}"

      - name: "Fetch git tags" # Required for axion-release-plugin
        run: git fetch --tags --unshallow

      - name: "Set up QEMU"
        uses: docker/setup-qemu-action@v4

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Login to DockerHub"
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Generate Docker Tags"
        id: generate-tags
        run: |
          VERSION="${{ needs.github.outputs.version }}"
          MAJOR=$(echo $VERSION | cut -d '.' -f 1)
          MINOR=$(echo $VERSION | cut -d '.' -f 2)

          echo "tags=dzikoysk/reposilite:latest,dzikoysk/reposilite:${VERSION},dzikoysk/reposilite:${MAJOR},dzikoysk/reposilite:${MAJOR}.${MINOR},ghcr.io/dzikoysk/reposilite:latest,ghcr.io/dzikoysk/reposilite:${VERSION},ghcr.io/dzikoysk/reposilite:${MAJOR},ghcr.io/dzikoysk/reposilite:${MAJOR}.${MINOR}" >> "$GITHUB_OUTPUT"

      - name: "Build and push"
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: "linux/amd64,linux/arm64"
          push: true
          tags: ${{ steps.generate-tags.outputs.tags }}
