# GitHub Actions workflow to automatically publish snapshot builds.
name: "Publish snapshots"
on:
  push:
    branches: [ "main" ]

permissions:
  contents: read

env:
  JAVA_VERSION: 21

jobs:
  maven:
    name: "Maven"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Fetch git tags" # Required for axion-release-plugin
        run: git fetch --tags --unshallow

      - name: "Set up Java ${{ env.JAVA_VERSION }}"
        uses: actions/setup-java@v5
        with:
          java-version: "${{ env.JAVA_VERSION }}"
          distribution: "liberica"

      - name: "Grant execute permission for gradlew"
        run: chmod +x gradlew

      - name: "Set up Gradle"
        uses: gradle/actions/setup-gradle@v6

      - name: "Gradle publish"
        run: ./gradlew shadowJar publish
        env:
          MAVEN_NAME: ${{ secrets.MAVEN_NAME }}
          MAVEN_TOKEN: ${{ secrets.MAVEN_TOKEN }}

  docker:
    name: "Docker"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Fetch Git tags" # Required for axion-release-plugin
        run: git fetch --tags --unshallow

      - name: "Set up QEMU"
        uses: docker/setup-qemu-action@v4

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "Login to DockerHub"
        uses: docker/login-action@v4
        with:
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: "${{ github.repository_owner }}"
          password: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Build and push"
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            dzikoysk/reposilite:nightly
            ghcr.io/dzikoysk/reposilite:nightly
